<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/navigation :: navigation}"></div>

<div class="container">
    <div class="mt-3">
        <h4>Task details</h4>

        <div class="mb-3">
            <label class="form-label"><b>Title</b></label>
            <p class="form-control" th:text="${task.title}"></p>
        </div>

        <div class="mb-3">
            <label class="form-label"><b>Description</b></label>
            <p class="form-control" th:text="${task.description}"></p>
        </div>

        <div class="mb-3">
            <label class="form-label"><b>Creation Date</b></label>
            <p class="form-control" th:text="${{task.created}}"></p>
        </div>

        <div class="mb-3">
            <label class="form-label"><b>State</b></label>
            <p class="form-control">
                <span th:if="${task.done}">Completed</span>
                <span th:if="${!task.done}">New</span>
            </p>
        </div>

        <div class="mb-3 row">
            <div class="col-3">
                <a class="btn btn-secondary w-100" th:href="@{/tasks}">Back</a>
            </div>

            <div class="col-3">
                <a class="btn btn-success w-100"
                   th:if="${!task.done}"
                   th:href="@{/tasks/complete/{taskId}(taskId=${task.id})}">
                    Complete
                </a>
                <button class="btn btn-outline-success w-100"
                        th:if="${task.done}"
                        disabled>
                    Completed
                </button>
            </div>

            <div class="col-3">
                <a class="btn btn-primary w-100"
                   th:href="@{/tasks/update/{taskId}(taskId=${task.id})}">
                    Edit
                </a>
            </div>

            <div class="col-3">
                <a class="btn btn-danger w-100"
                   th:href="@{/tasks/delete/{taskId}(taskId=${task.id})}">
                    Delete
                </a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
